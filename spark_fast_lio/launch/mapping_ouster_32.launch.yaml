---
launch:
  - arg: {name: start_rviz, default: 'false', description: automatically start rviz}

  - arg: {name: rviz_path,   default: $(find-pkg-share spark_fast_lio)/rviz/ouster_32.rviz, description: rviz file to load}
  - arg: {name: config_path, default: $(find-pkg-share spark_fast_lio)/config/ouster_32.yaml, description: Model-specific configuration}

  - node:
      pkg: spark_fast_lio
      exec: spark_lio_mapping
      name: lio_mapping
      output: screen
      on_exit: shutdown

      remap:
        - { from: 'lidar', to: '/husky/ouster/points' }
        - { from: 'imu',   to: '/husky/vectornav/imu' }

      param:
        - name: "common.lidar_frame"
          value: "husky/os_sensor"
        - name: "common.imu_frame"
          value: "husky/os_imu"
        - name: "gravity_alignment.enable_gravity_alignment"
          value: true

        - from: $(var config_path)

  - node:
      if: $(var start_rviz)
      pkg: rviz2
      exec: rviz2
      name: "rviz"
      launch-prefix: "nice"
      output: "screen"
      args: >
        -d $(var rviz_path)
